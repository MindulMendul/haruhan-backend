sonar.projectKey=MindulMendul_haruhan-backend
sonar.organization=mindulmendul

sonar.sources=app
sonar.tests=tests
sonar.exclusions=migrations/**
sonar.python.version=3.11

# 테스트 픽스처의 하드코딩된 문자열("supersecret" 등)은 실제 자격증명이 아니라
# 테스트용 더미 값이라 S2068(Hard-coded credentials) 오탐 대상으로 제외한다.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S2068
sonar.issue.ignore.multicriteria.e1.resourceKey=tests/**/*.py
