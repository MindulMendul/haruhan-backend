version: '3.8'

services:
  haruhan-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: haruhan-backend
    restart: unless-stopped
    ports:
      - "18000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - API_KEY=${API_KEY:-}
      - CHAT_RATE_LIMIT=${CHAT_RATE_LIMIT:-10/minute}
      - MAX_PROMPT_LENGTH=${MAX_PROMPT_LENGTH:-4000}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-14}
    networks:
      - haruhan-net
      - mindul-net

# 외부 bridge 네트워크 대신, compose가 알아서 사용자 정의 네트워크를 만들도록 수정
networks:
  haruhan-net:
    driver: bridge
  # Ollama 등 다른 스택과 같은 네트워크에서 통신하기 위한 외부 네트워크.
  # Portainer에서 미리 만들어둔 네트워크를 그대로 참조한다 (여기서 새로 만들지 않음).
  mindul-net:
    external: true