version: '3.8'

services:
  haruhan-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: haruhan-backend
    restart: unless-stopped
    ports:
      - "8080:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
    networks:
      - haruhan-net

# 외부 bridge 네트워크 대신, compose가 알아서 사용자 정의 네트워크를 만들도록 수정
networks:
  haruhan-net:
    driver: bridge