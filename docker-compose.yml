version: '3.8'

services:
  haruhan-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: haruhan-backend
    restart: unless-stopped
    ports:
      - "18000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - API_KEY=${API_KEY:-}
      - CHAT_RATE_LIMIT=${CHAT_RATE_LIMIT:-10/minute}
      - MAX_PROMPT_LENGTH=${MAX_PROMPT_LENGTH:-4000}
    networks:
      - haruhan-net

# 외부 bridge 네트워크 대신, compose가 알아서 사용자 정의 네트워크를 만들도록 수정
networks:
  haruhan-net:
    driver: bridge